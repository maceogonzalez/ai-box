model_list:
  - model_name: gpt-3.5-turbo
    litellm_params:
      model: openai/gpt-3.5-turbo
      api_key: os.environ/OPENAI_API_KEY
  
  - model_name: gpt-5
    litellm_params:
      model: openai/gpt-5
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-5.1
    litellm_params:
      model: azure/gpt-5.1
      api_key: os.environ/AZURE_OPENAI_API_KEY
      api_base: https://chi-tech-demos.cognitiveservices.azure.com
      api_version: "2025-01-01-preview"


  
  - model_name: claude-4-5-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-5-20250929
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY

  - model_name: mistral-small
    litellm_params:
      model: azure/mistral-small-2503
      api_base: https://chi-tech-demo-resource.services.ai.azure.com/models/chat/completions?api-version=2024-05-01-preview
      api_key: os.environ/MISTRAL_API_KEY

  # Video Generation Models
  - model_name: sora-2
    litellm_params:
      model: openai/sora-2
      api_key: os.environ/OPENAI_API_KEY
      seconds: "4"  # Duration: must be "4", "8", or "12"
      size: "720x1280"  # Default video dimensions (portrait)

  # Image Generation Models
  - model_name: dall-e-3
    litellm_params:
      model: openai/dall-e-3
      api_key: os.environ/OPENAI_API_KEY
      size: "1024x1024"  # Options: 1024x1024, 1792x1024, 1024x1792
      quality: "standard"  # Options: standard, hd
      n: 1

  - model_name: dall-e-2
    litellm_params:
      model: openai/dall-e-2
      api_key: os.environ/OPENAI_API_KEY
      size: "1024x1024"  # Options: 256x256, 512x512, 1024x1024
      n: 1

  - model_name: gpt-image-1
    litellm_params:
      model: openai/gpt-image-1
      api_key: os.environ/OPENAI_API_KEY
      size: "1024x1024"  # Options: 1024x1024, 1536x1024, 1024x1536
      quality: "auto"  # Options: auto, high, medium, low

  # Add your Ollama models
  - model_name: llama3.2
    litellm_params:
      model: ollama/llama3.2
      api_base: http://ollama:11434

litellm_settings:
  drop_params: true
  set_verbose: true
  extra_spend_tag_headers:
    - "x-custom-header"

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  user_header_mappings:
    - header_name: X-OpenWebUI-User-Name
      litellm_user_role: internal_user
    - header_name: X-OpenWebUI-User-Email
      litellm_user_role: customer

mcp_servers:
  youtube_transcript:
    url: "http://mcp-youtube-transcript:6969"
    spec_path: "/app/youtube-openapi.json"
    auth_type: "none"
    description: "Retrieves transcripts and metadata from YouTube videos"
